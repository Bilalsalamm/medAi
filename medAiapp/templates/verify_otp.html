<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <title>Verify OTP - Med Ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }
        body {
            background-color: #1b4481;
            /* background-image: url('{% static "images/login.png" %}'); */
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .otp-container {
            display: flex;
            width: 1000px;
            max-width: 95%;
            height: 700px;
            background: rgb(160, 228, 179);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .illustration-side {
            flex: 1.2;
            background-color: #c0eec4;
            background-image: url('{% static "images/otp.png" %}');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 40px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #555;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }
        .input-wrapper input:focus {
            border-color: #26c6da;
        }
        .input-wrapper i {
            position: absolute;
            right: 15px;
            color: #aaa;
            cursor: pointer;
            pointer-events: none;
        }
        .error {
            color: #ff5252;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 700;
        }
        .info-box {
            background-color: #e3f2fd;
            color: #1565c0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #1565c0;
            font-size: 14px;
            text-align: center;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #4dd0e1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #26c6da;
        }
        .timer {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 15px;
        }
        .resend-link {
            text-align: center;
            margin-top: 15px;
        }
        .resend-link a {
            color: #ff8a65;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
        }
        .resend-link a:hover {
            text-decoration: underline;
        }
        .email-display {
            text-align: center;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        .btn-home {
            width: fit-content;
            display: inline-block;
            padding: 10px 10px;
            background-color: #39cadd;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .btn-home:hover {
            background-color: #26c6da;
        }
        .btn-home i {
            margin-right: 5px;
        }
        @media (max-width: 850px) {
            .illustration-side { display: none; }
            .otp-container { width: 450px; height: auto; }
            .form-side { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <div class="illustration-side">
            <div class="logo">
                <i class="fas fa-leaf"></i> Med Ai
            </div>
        </div>
        <div class="form-side">
            <a href="/" class="btn-home"><i class="fas fa-home"></i> Home</a>
            <h2>Verify OTP</h2>
            
            <div class="email-display">
                <i class="fas fa-envelope"></i> {{ email }}
            </div>
            
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            
            <div class="info-box">
                <i class="fas fa-info-circle"></i> A 6-digit OTP has been sent to your email. It will expire in 10 minutes.
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label for="otp">OTP Code</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="otp" 
                            name="otp" 
                            placeholder="000000" 
                            required
                            maxlength="6"
                            pattern="[0-9]{6}"
                            inputmode="numeric"
                        >
                        <i class="fas fa-lock"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fas fa-check"></i> Verify OTP
                </button>
            </form>
            
            <div class="timer">
                <i class="fas fa-hourglass-end"></i> OTP expires in 10 minutes
            </div>
            
            <div class="resend-link">
                <a href="/forgot-password/"><i class="fas fa-redo"></i> Request New OTP</a>
            </div>
        </div>
    </div>
    
    <script>
        // Only allow numbers in OTP input and auto-submit when 6 digits entered
        document.getElementById('otp').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length === 6) {
                // Auto-submit if 6 digits entered
                this.form.submit();
            }
        });
    </script>
</body>
</html>

</body>
</html>
