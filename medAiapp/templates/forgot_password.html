<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #341c94 0%, #b12971 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(52,28,148,0.2); padding: 40px 32px; width: 350px; max-width: 90vw; display: flex; flex-direction: column; align-items: center; }
        .card h2 { color: #341c94; margin-bottom: 24px; font-weight: 700; }
        .card input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 16px; font-size: 16px; }
        .card button { width: 100%; padding: 12px; background: linear-gradient(90deg, #341c94 0%, #b12971 100%); color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .card button:hover { background: linear-gradient(90deg, #b12971 0%, #341c94 100%); }
        .card .message { color: #b12971; margin-top: 12px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Forgot Password</h2>
        <form method="post">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send Reset Link</button>
        </form>
        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
