<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <title>Password Reset Successful - Med Ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }
        body {
            background-color: #1b4481;
            background-image: url('{% static "images/login.png" %}');
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .success-container {
            display: flex;
            width: 1000px;
            max-width: 95%;
            height: auto;
            background: rgb(160, 228, 179);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .illustration-side {
            flex: 1.2;
            background-color: #c0eec4;
            background-image: url('{% static "images/login.png" %}');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 40px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .success-icon {
            font-size: 64px;
            color: #4caf50;
            margin-bottom: 20px;
            animation: slideDown 0.6s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 700;
        }
        .message {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .success-box {
            background-color: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            color: #2e7d32;
            font-weight: 500;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-login {
            background-color: #4dd0e1;
            color: white;
        }
        .btn-login:hover {
            background-color: #26c6da;
        }
        .btn-home {
            background: #f0f0f0;
            color: #333;
        }
        .btn-home:hover {
            background: #e0e0e0;
        }
        .info-text {
            font-size: 13px;
            color: #999;
            margin-top: 20px;
            font-style: italic;
        }
        @media (max-width: 850px) {
            .illustration-side { display: none; }
            .success-container { width: 450px; }
            .form-side { padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="illustration-side">
            <div class="logo">
                <i class="fas fa-leaf"></i> Med Ai
            </div>
        </div>
        <div class="form-side">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            
            <h2>Password Reset Successful</h2>
            
            <div class="success-box">
                {{ message }}
            </div>
            
            <p class="message">
                Your password has been successfully updated. You can now login with your new password.
            </p>
            
            <div class="button-group">
                <a href="/login/" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> Go to Login
                </a>
                <a href="/" class="btn btn-home">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>
            
            <p class="info-text">
                Need help? Contact our support team.
            </p>
        </div>
    </div>
</body>
</html>
