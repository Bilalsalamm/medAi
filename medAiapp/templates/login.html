<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #341c94 0%, #b12971 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(52,28,148,0.2);
            padding: 40px 32px;
            width: 350px;
            max-width: 90vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-card h2 {
            color: #341c94;
            margin-bottom: 24px;
            font-weight: 700;
        }
        .login-card label {
            color: #b12971;
            font-weight: 500;
            margin-top: 12px;
            margin-bottom: 4px;
            align-self: flex-start;
        }
        .login-card input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .login-card input:focus {
            border-color: #341c94;
            outline: none;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #341c94 0%, #b12971 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .login-card button:hover {
            background: linear-gradient(90deg, #b12971 0%, #341c94 100%);
        }
        .login-card .fa-user-lock {
            color: #b12971;
            font-size: 32px;
            margin-bottom: 16px;
        }
        .login-card .error {
            color: #b12971;
            margin-top: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <i class="fas fa-user-lock"></i>
        <h2>Login to medAi</h2>
        <form method="post">
            {% csrf_token %}
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <button type="submit">Login</button>
        </form>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
            <div style="width:100%;margin-top:18px;display:flex;flex-direction:column;align-items:center;gap:8px;">
                <a href="/forgot-password/" style="color:#341c94;text-decoration:none;font-weight:500;">Forgot Password?</a>
                <a href="/register/" style="color:#b12971;text-decoration:none;font-weight:500;">Create New User</a>
            </div>
    </div>
</body>
</html>
