<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <title>Med Ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }
        body {
            background-color: #1b4481;
            background-image: url('{% static "images/login.png" %}');
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            width: 1000px;
            max-width: 95%;
            height: 700px;
            background: rgb(160, 228, 179);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .illustration-side {
            flex: 1.2;
            background-color: #c0eec4;
            background-image: url('{% static "images/login.png" %}');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 40px;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
            color: #333;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: #555;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }
        .input-wrapper i {
            position: absolute;
            right: 15px;
            color: #aaa;
            cursor: pointer;
        }
        .forgot-password {
            display: block;
            text-align: left;
            color: #ff8a65;
            text-decoration: none;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 25px;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #4dd0e1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #26c6da;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #aaa;
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
        .sign-in-text {
            text-align: center;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .sign-in-text a {
            color: #333;
            font-weight: 700;
        }
        .social-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .social-btn:hover {
            background-color: #f9f9f9;
        }
        .social-btn i {
            font-size: 18px;
        }
        @media (max-width: 850px) {
            .illustration-side { display: none; }
            .login-container { width: 450px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="illustration-side">
            <div class="logo">
                <i class="fas fa-leaf"></i> Med Ai
            </div>
        </div>
        <div class="form-side">
            <h2>Login</h2>
            {% if error %}
                <div style="color:#ff5252; text-align:center; margin-bottom:18px; font-weight:700;">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label for="username">Username or Email</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
                        <i class="far fa-envelope"></i>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <i class="far fa-eye-slash"></i>
                    </div>
                </div>
                <a href="/forgot-password/" class="forgot-password">Forgot Password?</a>
                <button class="btn-login" type="submit">Log In</button>
            </form>
            <div class="divider">Or</div>
            <p class="sign-in-text">Don't have an account? <a href="/register/">Register</a></p>
            <button class="social-btn">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <button class="social-btn">
                <i class="fab fa-apple"></i> Continue with Apple
            </button>
            <button class="social-btn">
                <i class="fab fa-facebook"></i> Continue with Facebook
            </button>
        </div>
    </div>
</body>
</html>
